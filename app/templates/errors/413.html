{% extends "base.html" %}

{% block title %}File Too Large - Blog CMS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 text-center">
        <div>
            <h1 class="text-9xl font-bold text-yellow-300">413</h1>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                File too large
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                The file you're trying to upload is too large. Maximum file size is 10MB.
            </p>
        </div>
        <div class="mt-8 space-y-4">
            <button onclick="window.history.back()" 
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
                Go back
            </button>
            <a href="{{ url_for('blog.index') }}" 
               class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
                Go to homepage
            </a>
        </div>
    </div>
</div>
{% endblock %}
